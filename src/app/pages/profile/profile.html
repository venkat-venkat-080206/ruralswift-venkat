
<div class="profile-page">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">

    <div class="profile-top">

      <div class="avatar">
        <i class="bi bi-person-fill"></i>
      </div>

      <h3>Customer</h3>

      <button class="edit-btn">
        <i class="bi bi-pencil-fill"></i>
        Edit Profile
      </button>

    </div>

    <!-- MENU -->
    <div class="menu">

      <div
        class="menu-item"
        [class.active]="selectedTab === 'personal'"
        (click)="selectedTab = 'personal'">

        <i class="bi bi-person-circle"></i>
        <span>Personal Information</span>

      </div>

      <div
        class="menu-item"
        [class.active]="selectedTab === 'address'"
        (click)="selectedTab = 'address'">

        <i class="bi bi-geo-alt-fill"></i>
        <span>Delivery Address</span>

      </div>

      <div
        class="menu-item"
        [class.active]="selectedTab === 'payment'"
        (click)="selectedTab = 'payment'">

        <i class="bi bi-credit-card-fill"></i>
        <span>My Payments</span>

      </div>

      <div
        class="menu-item"
        [class.active]="selectedTab === 'account'"
        (click)="selectedTab = 'account'">

        <i class="bi bi-gear-fill"></i>
        <span>Account Options</span>

      </div>

    </div>

  </div>

  <!-- RIGHT CONTENT -->
  <div class="content">

    <!-- PERSONAL INFO -->
    <div *ngIf="selectedTab==='personal'" class="content-card">

  <h2>Personal Information</h2>

  <form class="profile-form">

    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" class="form-control" placeholder="Enter Full Name">
    </div>

    <div class="form-group">
      <label>Phone Number *</label>
      <input type="text" class="form-control" placeholder="+91XXXXXXXXXX">
    </div>

    <div class="form-group">
      <label>Email ID *</label>
      <input type="email" class="form-control" placeholder="Enter Email">
    </div>

    <div class="form-group">
      <label>Gender *</label>
      <select class="form-control">
        <option>Female</option>
        <option>Male</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>Languages Spoken *</label>
      <input type="text" class="form-control" placeholder="Tamil, English">
    </div>

    <div class="form-group">
      <label>Occupation *</label>
      <input type="text" class="form-control" placeholder="Student">
    </div>

    <div class="form-group">
      <label>My Business Name *</label>
      <input type="text" class="form-control" placeholder="Business Name">
    </div>

    <div class="form-group">
      <label>Pincode *</label>
      <input type="text" class="form-control" placeholder="620001">
    </div>

    <div class="form-group">
      <label>City *</label>
      <input type="text" class="form-control" placeholder="Trichy">
    </div>

    <div class="form-group">
      <label>State *</label>
      <select class="form-control">
        <option>Tamil Nadu</option>
        <option>Kerala</option>
        <option>Karnataka</option>
      </select>
    </div>

    <button type="submit" class="save-btn">
      Save
    </button>

  </form>

</div>

    <!-- ADDRESS -->
   <div *ngIf="selectedTab==='address'" class="content-card">

  <h2>Delivery Address</h2>

  <form class="profile-form">

    <div class="form-group">
      <label>Home Address *</label>
      <textarea
        class="form-control"
        rows="4"
        placeholder="Enter Home Address">
      </textarea>
    </div>

    <div class="form-group">
      <label>Office Address *</label>
      <textarea
        class="form-control"
        rows="4"
        placeholder="Enter Office Address">
      </textarea>
    </div>

    <button
      type="submit"
      class="save-btn">

      Save Address

    </button>

  </form>

</div>
    <div *ngIf="selectedTab==='payment'" class="content-card">

  <h2>My Payments</h2>

  <div class="payment-grid">

    <div class="payment-card">
      <i class="bi bi-google"></i>
      <span>Google Pay</span>
    </div>

    <div class="payment-card">
      <i class="bi bi-phone"></i>
      <span>PhonePe</span>
    </div>

    <div class="payment-card">
      <i class="bi bi-credit-card"></i>
      <span>Debit Card</span>
    </div>

    <div class="payment-card">
      <i class="bi bi-cash-stack"></i>
      <span>Cash On Delivery</span>
    </div>

  </div>

</div>

    <!-- ACCOUNT OPTIONS -->
    <div *ngIf="selectedTab === 'account'" class="content-card">

      <h2>Account Options</h2>

      <div class="option">
        <span>Become a Delivery Partner</span>
        <i class="bi bi-chevron-right"></i>
      </div>

      <div class="option">
        <span>Become a Supplier</span>
        <i class="bi bi-chevron-right"></i>
      </div>

      <div class="option">
        <span>Privacy & Security</span>
        <i class="bi bi-chevron-right"></i>
      </div>

      <div class="option">
        <span>Help & Support</span>
        <i class="bi bi-chevron-right"></i>
      </div>

      <div class="option logout">
        <span>Logout</span>
        <i class="bi bi-chevron-right"></i>
      </div>

    </div>

  </div>

</div>
